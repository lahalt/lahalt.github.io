<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>らはるとはるとのスケッチブック</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fafafa;
      color: #111;
    }

    .container {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 20px;
    }

    h1 { font-size: 28px; }
    h2 {
      margin-top: 40px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 6px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }

    .grid a {
      display: block;
    }

    .grid img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 6px;
      transition: transform 0.2s ease;
    }

    .grid img:hover {
      transform: scale(1.03);
    }

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      display: none;
      z-index: 9999;
      padding: 8px;
      box-sizing: border-box;
      overflow: auto;
    }
    
    .lightbox:target {
      display: block;
    }
    
    .lightbox a.bg {
      position: fixed;
      inset: 0;
    }
    
    .lightbox img {
      display: block;
      width: auto;
      height: auto;
      max-width: min(100%, 900px);
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    
    .close {
      position: fixed;
      top: 12px;
      right: 12px;
      width: 40px;
      height: 40px;
      text-decoration: none;
      z-index: 2;
    }
    
    .close::before,
    .close::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 24px;
      height: 2px;
      background: white;
    }
    
    .close::before {
      transform: translate(-50%, -50%) rotate(45deg);
    }
    
    .close::after {
      transform: translate(-50%, -50%) rotate(-45deg);
    }

    .note {
      margin-top: 8px;
      font-size: 12px;
      color: #666;
    }

    .footer {
      margin-top: 60px;
      color: #666;
      font-size: 14px;
    }

    a { color: inherit; }

    .credit a {
      color: #3b82f6;
      text-decoration: underline;
    }
    
    .credit a:hover {
      opacity: 0.8;
    }
  </style>
</head>

<body>
  <div class="container">

    <h1>らはるとはると</h1>
    <p>インターネット落書きマン</p>

    <h2>About</h2>
    <p>東方Projectの二次創作でフランドールスカーレットばかり描いている絵描きです</p>

    <h2>作品</h2>
    <h5>本サイトに掲載されている作品は東方Projectの二次創作です。<br>原作:上海アリス幻樂団(ZUN)</h5>

    <div class="grid">
      <a href="#img1"><img src="image1.jpg" alt=""></a>
      <a href="#img2"><img src="image2.jpg" alt=""></a>
      <a href="#img3"><img src="image3.jpg" alt=""></a>
    </div>

    <!-- ライトボックス -->
    <div id="img1" class="lightbox">
      <a href="#" class="bg"></a>
      <a href="#" class="close"></a>
      <img src="image1.jpg" alt="">
    </div>
    
    <div id="img2" class="lightbox">
      <a href="#" class="bg"></a>
      <a href="#" class="close"></a>
      <img src="image2.jpg" alt="">
    </div>

    <div id="img3" class="lightbox">
      <a href="#" class="bg"></a>
      <a href="#" class="close"></a>
      <img src="image3.jpg" alt="">
    </div>

    <p class="note">※このサイトに掲載している作品は東方Projectの二次創作であり、原作とは関係ありません。</p>
    <div class="footer">
      <p>© 2026 <a href="https://x.com/lahalt" class="credit">らはるとはると</a></p>
    </div>

  </div>
</body>
</html>
